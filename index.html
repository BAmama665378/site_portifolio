<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio - Alexandre Ramos</title>
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome para ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <header>
    <div class="profile">
      <h1>Alexandre Ramos</h1>
      <p>Portfólio Digital</p>
    </div>
    <nav>
      <ul>
        <li><a href="#biografia"><i class="fa fa-user"></i> Biografia</a></li>
        <li><a href="#curriculo"><i class="fa fa-graduation-cap"></i> Currículo</a></li>
        <li><a href="#projetos"><i class="fa fa-folder"></i> Projetos</a></li>
        <li><a href="#habilidades"><i class="fa fa-lightbulb"></i> Habilidades</a></li>
        <li><a href="#certificados"><i class="fa fa-certificate"></i> Certificados</a></li>
        <li><a href="#programas"><i class="fa fa-code"></i> Programas em C</a></li>
        <li><a href="#contato"><i class="fa fa-envelope"></i> Contato</a></li>
      </ul>
    </nav>
  </header>

  <!-- Seção Programas em C -->
  <section id="programas" class="card teal">
    <h2><i class="fa fa-code"></i> Programas em C</h2>
    <p>Exercício com vetores: cálculo da média da turma, notas acima da média, maior e menor nota.</p>
    <pre><code id="codigoC">Carregando código...</code></pre>
  </section>

  <footer>
    <p>© 2026 Alexandre Ramos</p>
  </footer>

  <!-- Script para puxar o código de vetores.c -->
  <script>
    fetch('vetores.c')
      .then(response => response.text())
      .then(data => {
        document.getElementById('codigoC').textContent = data;
      })
      .catch(error => {
        document.getElementById('codigoC').textContent = "Erro ao carregar o código.";
        console.error(error);
      });
  </script>
</body>
</html>
